<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediaVault — Video Player</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:'#6366f1',ink:'#0b0d12'}}}}</script>
<style>body{font-family:Inter,system-ui,sans-serif}</style>
</head>
<body class="bg-white dark:bg-ink text-slate-900 dark:text-slate-100">
<header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-ink/80 border-b border-slate-200 dark:border-slate-800">
  <div class="mx-auto max-w-[1600px] px-6 h-16 flex items-center"><a href="index.html" class="font-bold text-lg">Media<span class="text-brand">Vault</span></a>
  <button onclick="document.documentElement.classList.toggle('dark')" class="ml-auto w-10 h-10 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">🌓</button></div>
</header>

<main class="mx-auto max-w-[1600px] px-6 py-8 grid lg:grid-cols-[1fr_360px] gap-8">
  <div>
    <!-- PLAYER -->
    <div class="relative rounded-2xl overflow-hidden bg-black aspect-video group">
      <img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1400&q=80" class="w-full h-full object-cover opacity-80"/>
      <button class="absolute inset-0 m-auto w-20 h-20 rounded-full bg-white/90 text-ink text-3xl grid place-items-center">▶</button>

      <!-- CONTROL BAR -->
      <div class="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/90 to-transparent">
        <!-- scrubber -->
        <div class="h-1.5 rounded-full bg-white/30 mb-3"><div class="h-1.5 rounded-full bg-brand w-1/3 relative"><span class="absolute -right-1.5 -top-1 w-3.5 h-3.5 rounded-full bg-white"></span></div></div>
        <div class="flex items-center gap-4 text-white text-sm">
          <button>⏯</button>
          <div class="flex items-center gap-2"><button>🔊</button><div class="h-1 w-20 rounded bg-white/30"><div class="h-1 w-3/4 rounded bg-white"></div></div></div>
          <span>2:14 / 6:48</span>
          <div class="ml-auto flex items-center gap-4">
            <button class="px-2 py-0.5 rounded bg-white/15 text-xs">1.5×</button>
            <button class="px-2 py-0.5 rounded bg-white/15 text-xs">1080p ⌄</button>
            <button title="Picture in picture">⧉</button>
            <button title="Fullscreen">⛶</button>
          </div>
        </div>
        <!-- quality menu -->
        <div class="absolute bottom-16 right-16 w-32 rounded-lg bg-black/90 text-white text-xs py-2">
          <div class="px-3 py-1.5 text-slate-400">Quality</div>
          <script>document.write(['Auto','4K (2160p)','1440p','1080p','720p','480p','360p'].map((q,i)=>`<div class="px-3 py-1.5 hover:bg-white/10 ${i==3?'text-brand':''}">${q} ${i==3?'✓':''}</div>`).join(''))</script>
        </div>
      </div>
    </div>

    <h1 class="text-2xl font-bold mt-5">Coastal Drone Cinematic — 4K</h1>
    <div class="flex items-center gap-3 mt-2 text-sm text-slate-400">
      <span>👁 284,019 views</span><span>· Published Jun 1, 2026</span>
      <span class="ml-auto flex gap-2">
        <button class="px-3 h-9 rounded-full bg-brand text-white">♥ 9.2k</button>
        <button class="px-3 h-9 rounded-full border border-slate-300 dark:border-slate-700">⬇ Download</button>
        <button class="px-3 h-9 rounded-full border border-slate-300 dark:border-slate-700">➦ Share</button>
      </span>
    </div>

    <div class="rounded-2xl border border-slate-200 dark:border-slate-800 p-5 mt-5">
      <h3 class="font-bold mb-3">Technical Information</h3>
      <dl class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-sm" id="tech"></dl>
    </div>
  </div>

  <aside>
    <h3 class="font-bold mb-3">Up Next</h3>
    <div class="space-y-3" id="next"></div>
  </aside>
</main>
<script>
document.getElementById('tech').innerHTML=[['Resolution','3840×2160'],['Codec','H.264 / HLS'],['Frame rate','60 fps'],['Bitrate','45 Mbps'],['Duration','6:48'],['Audio','AAC 320kbps'],['Size','1.9 GB'],['Streams','ABR 6 renditions'],['Container','MP4']].map(t=>`<div><dt class="text-slate-400">${t[0]}</dt><dd class="font-medium">${t[1]}</dd></div>`).join('');
document.getElementById('next').innerHTML=['1454496522488-7a8e488e8606','1505765050516-f72dcac9c60e','1518837695005-2083093ee35b','1469474968028-56623f02e42e'].map((id,i)=>`<a class="flex gap-3 group cursor-pointer"><div class="relative w-40 aspect-video rounded-lg overflow-hidden shrink-0"><img src="https://images.unsplash.com/photo-${id}?w=300&q=60" class="w-full h-full object-cover"/><span class="absolute bottom-1 right-1 px-1 rounded bg-black/70 text-white text-[10px]">4:0${i}</span></div><div><div class="text-sm font-medium group-hover:text-brand">Cinematic clip ${i+1}</div><div class="text-xs text-slate-400">@creator · ${10+i}k views</div></div></a>`).join('');
</script>
</body></html>
