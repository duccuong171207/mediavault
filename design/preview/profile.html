<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediaVault — Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:'#6366f1',ink:'#0b0d12'}}}}</script>
<style>body{font-family:Inter,system-ui,sans-serif}.masonry{column-gap:1rem}@media(min-width:640px){.masonry{column-count:2}}@media(min-width:1024px){.masonry{column-count:3}}.masonry>*{break-inside:avoid;margin-bottom:1rem}</style>
</head>
<body class="bg-white dark:bg-ink text-slate-900 dark:text-slate-100">
<header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-ink/80 border-b border-slate-200 dark:border-slate-800">
  <div class="mx-auto max-w-[1600px] px-6 h-16 flex items-center gap-4">
    <a href="index.html" class="font-bold text-lg">Media<span class="text-brand">Vault</span></a>
    <button onclick="document.documentElement.classList.toggle('dark')" class="ml-auto w-10 h-10 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">🌓</button>
  </div>
</header>

<!-- BANNER -->
<div class="relative h-64">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1920&q=80" class="w-full h-full object-cover"/>
  <div class="absolute inset-0 bg-gradient-to-t from-ink to-transparent"></div>
</div>

<div class="mx-auto max-w-[1600px] px-6">
  <div class="flex flex-col sm:flex-row items-start sm:items-end gap-5 -mt-16 relative">
    <img src="https://i.pravatar.cc/200?img=5" class="w-32 h-32 rounded-2xl ring-4 ring-white dark:ring-ink object-cover"/>
    <div class="pb-2">
      <h1 class="text-3xl font-extrabold">Elena Marsh</h1>
      <p class="text-slate-400">@elenamarsh · Landscape & travel photographer</p>
    </div>
    <div class="sm:ml-auto pb-2 flex gap-2">
      <button class="px-5 h-11 rounded-full bg-brand text-white font-semibold">Follow</button>
      <button class="px-5 h-11 rounded-full border border-slate-300 dark:border-slate-700">Message</button>
    </div>
  </div>

  <p class="mt-5 max-w-2xl text-slate-600 dark:text-slate-300">Chasing light across alpine ranges and coastlines. Available for commissions. Prints in bio.</p>
  <div class="flex gap-4 mt-3 text-sm text-brand">
    <a href="#">🌐 elenamarsh.com</a><a href="#">📷 Instagram</a><a href="#">🐦 Twitter</a>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-8">
    <script>document.write([['Media','842'],['Albums','24'],['Followers','12.4k'],['Total views','3.1M']]
      .map(s=>`<div class="rounded-2xl border border-slate-200 dark:border-slate-800 p-5"><div class="text-2xl font-bold">${s[1]}</div><div class="text-sm text-slate-400">${s[0]}</div></div>`).join(''))</script>
  </div>

  <!-- TABS -->
  <div class="flex gap-6 border-b border-slate-200 dark:border-slate-800 mt-8 mb-6">
    <button class="pb-3 border-b-2 border-brand font-semibold">Media</button>
    <button class="pb-3 border-b-2 border-transparent text-slate-400">Albums</button>
    <button class="pb-3 border-b-2 border-transparent text-slate-400">Favorites</button>
    <button class="pb-3 border-b-2 border-transparent text-slate-400">About</button>
  </div>

  <div class="masonry pb-16" id="grid"></div>
</div>
<script>
document.getElementById('grid').innerHTML=['1506744038136-46273834b3fb','1441974231531-c6227db76b6e','1470071459604-3b5ec3a7fe05','1426604966848-d7adac402bff','1433086966358-54859d0ed716','1472214103451-9374bd1c798e','1418065460487-3e41a6c84dc5','1444703686981-a3abbc4d4fe3','1439066615861-d1af74d74000','1469474968028-56623f02e42e']
  .map(id=>`<img loading="lazy" src="https://images.unsplash.com/photo-${id}?w=600&q=70" class="w-full rounded-2xl cursor-pointer hover:opacity-90 transition"/>`).join('');
</script>
</body></html>
