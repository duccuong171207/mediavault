<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediaVault — Search</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:'#6366f1',ink:'#0b0d12'}}}}</script>
<style>body{font-family:Inter,system-ui,sans-serif}.masonry{column-gap:1rem}@media(min-width:640px){.masonry{column-count:2}}@media(min-width:1280px){.masonry{column-count:3}}.masonry>*{break-inside:avoid;margin-bottom:1rem}</style>
</head>
<body class="bg-white dark:bg-ink text-slate-900 dark:text-slate-100">
<header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-ink/80 border-b border-slate-200 dark:border-slate-800">
  <div class="mx-auto max-w-[1600px] px-6 h-16 flex items-center gap-4">
    <a href="index.html" class="font-bold text-lg shrink-0">Media<span class="text-brand">Vault</span></a>
    <div class="flex-1 max-w-2xl relative">
      <input value="alpine sunrise" class="w-full h-10 rounded-full bg-slate-100 dark:bg-slate-800 pl-11 pr-4 text-sm outline-none focus:ring-2 ring-brand"/>
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">⌕</span>
    </div>
    <button onclick="document.documentElement.classList.toggle('dark')" class="w-10 h-10 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">🌓</button>
  </div>
</header>

<div class="mx-auto max-w-[1600px] px-6 py-8 grid lg:grid-cols-[260px_1fr] gap-8">
  <!-- FILTER SIDEBAR -->
  <aside class="space-y-6">
    <div>
      <h3 class="font-semibold mb-3 text-sm uppercase tracking-wide text-slate-400">Type</h3>
      <div class="space-y-2 text-sm">
        <script>document.write([['All','12,840',true],['Photos','9,210',false],['Videos','2,930',false],['Albums','700',false]]
          .map(t=>`<label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="t" ${t[2]?'checked':''} class="accent-brand"/> ${t[0]} <span class="ml-auto text-slate-400">${t[1]}</span></label>`).join(''))</script>
      </div>
    </div>
    <div>
      <h3 class="font-semibold mb-3 text-sm uppercase tracking-wide text-slate-400">Upload date</h3>
      <div class="space-y-2 text-sm text-slate-300">
        <script>document.write(['Any time','Past 24 hours','Past week','Past month','Past year'].map((d,i)=>`<label class="flex gap-2 cursor-pointer"><input type="radio" name="d" ${i==0?'checked':''} class="accent-brand"/> ${d}</label>`).join(''))</script>
      </div>
    </div>
    <div>
      <h3 class="font-semibold mb-3 text-sm uppercase tracking-wide text-slate-400">Resolution</h3>
      <div class="space-y-2 text-sm text-slate-300">
        <script>document.write(['Any','HD (720p+)','Full HD (1080p+)','4K (2160p+)'].map(d=>`<label class="flex gap-2 cursor-pointer"><input type="checkbox" class="accent-brand"/> ${d}</label>`).join(''))</script>
      </div>
    </div>
    <div>
      <h3 class="font-semibold mb-3 text-sm uppercase tracking-wide text-slate-400">Sort by</h3>
      <select class="w-full h-10 rounded-lg bg-slate-100 dark:bg-slate-800 px-3 text-sm outline-none">
        <option>Relevance</option><option>Most popular</option><option>Newest</option><option>Most downloaded</option>
      </select>
    </div>
  </aside>

  <!-- RESULTS -->
  <div>
    <div class="flex items-center justify-between mb-5">
      <p class="text-slate-400 text-sm"><b class="text-slate-100">12,840</b> results for "alpine sunrise"</p>
      <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
        <button class="px-3 py-1 rounded-md bg-white dark:bg-slate-700 text-sm">▦ Grid</button>
        <button class="px-3 py-1 rounded-md text-sm text-slate-400">☰ List</button>
      </div>
    </div>
    <div class="masonry" id="grid"></div>
  </div>
</div>
<script>
document.getElementById('grid').innerHTML=['1506744038136-46273834b3fb','1441974231531-c6227db76b6e','1470071459604-3b5ec3a7fe05','1426604966848-d7adac402bff','1433086966358-54859d0ed716','1472214103451-9374bd1c798e','1418065460487-3e41a6c84dc5','1444703686981-a3abbc4d4fe3','1439066615861-d1af74d74000','1505765050516-f72dcac9c60e','1454496522488-7a8e488e8606','1518837695005-2083093ee35b']
  .map((id,i)=>`<figure class="relative rounded-2xl overflow-hidden group cursor-pointer"><img loading="lazy" src="https://images.unsplash.com/photo-${id}?w=600&q=70" class="w-full"/>${i%4==2?'<span class="absolute top-2 right-2 px-2 py-0.5 rounded bg-black/60 text-white text-xs">▶ HD</span>':''}</figure>`).join('');
</script>
</body></html>
